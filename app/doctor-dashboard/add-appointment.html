<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Appointment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header Section -->
<header class="header">
    <h1>Add Appointment</h1>
    <p class="subheading">Schedule your appointment easily and quickly.</p>
</header>

<div class="container">
    <form action="#" method="post" class="appointment-form">

        <!-- Patient Information Section -->
        <section class="section">
            <h2>Patient Information</h2>
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob">
            </div>
            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter email address">
            </div>
        </section>

        <!-- Appointment Details Section -->
        <section class="section">
            <h2>Appointment Details</h2>
            <div class="form-group">
                <label for="reason">Reason for Visit:</label>
                <select id="reason" name="reason">
                    <option value="checkup">Routine Checkup</option>
                    <option value="followup">Follow-up Appointment</option>
                    <option value="general_illness">General Illness</option>
                    <option value="physical_exam">Annual Physical Exam</option>
                    <option value="vaccination">Vaccination</option>
                    <option value="prescription">Prescription Refill</option>
                    <option value="chronic_condition">Chronic Condition Management</option>
                    <option value="skin_issues">Skin Issues</option>
                    <option value="pain_management">Pain Management</option>
                    <option value="digestive_issues">Digestive Issues</option>
                    <option value="respiratory_problems">Respiratory Problems</option>
                    <option value="headache">Headache or Migraine</option>
                    <option value="mental_health">Mental Health Concerns</option>
                    <option value="womens_health">Women's Health</option>
                    <option value="mens_health">Men's Health</option>
                    <option value="child_health">Child's Health</option>
                    <option value="minor_injury">Minor Injury</option>
                    <option value="allergy">Allergy Symptoms</option>
                    <option value="vision_problems">Vision Problems or Eye Checkup</option>
                    <option value="hearing_problems">Hearing Problems or Ear Checkup</option>
                    <option value="preoperative">Preoperative Assessment</option>
                    <option value="postoperative">Postoperative Follow-Up</option>
                    <option value="lab_results">Lab Test Results Review</option>
                    <option value="specialist_referral">Referral to Specialist</option>
                    <option value="second_opinion">Second Opinion Consultation</option>
                    <option value="travel_health">Travel Health Advice or Vaccination</option>
                    <option value="sexual_health">Sexual Health Concerns</option>
                    <option value="sleep_disorders">Sleep Disorders</option>
                    <option value="weight_management">Weight Management or Nutrition Counseling</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dateTime">Preferred Date & Time:</label>
                <input type="datetime-local" id="dateTime" name="dateTime">
            </div>
            <div class="form-group">
                <label for="doctor">Doctor/Specialist:</label>
                <select id="doctor" name="doctor">
                    <option value="doctor1">Dr. Smith</option>
                    <option value="doctor2">Dr. Johnson</option>
                    <option value="doctor3">Dr. Lee</option>
                </select>
            </div>
            <div class="form-group">
                <label>Appointment Type:</label>
                <label for="inPerson"><input type="radio" id="inPerson" name="appointmentType" value="inPerson"> In-person</label>
                <label for="telemedicine"><input type="radio" id="telemedicine" name="appointmentType" value="telemedicine"> Telemedicine</label>
            </div>
        </section>

        <!-- Medical Information Section -->
        <section class="section">
            <h2>Medical Information</h2>
            <div class="form-group">
                <label for="symptoms">Current Symptoms/Concerns:</label>
                <textarea id="symptoms" name="symptoms" rows="4" placeholder="Describe symptoms or concerns"></textarea>
            </div>
            <div class="form-group">
                <label for="medicalReports">Upload Medical Reports:</label>
                <input type="file" id="medicalReports" name="medicalReports">
            </div>
            <div class="form-group">
                <label for="insurance">Insurance Information:</label>
                <input type="text" id="insurance" name="insurance" placeholder="Enter provider name and ID">
            </div>
        </section>

        <!-- Footer Section -->
        <section class="footer">
            <button type="submit" class="btn primary-btn">Confirm Appointment</button>
            <button type="reset" class="btn secondary-btn">Reset Form</button>
            <a href="#" class="help-link">Need Help?</a>
            <p class="privacy-notice">By confirming, you agree to our <a href="#">Privacy Policy</a>.</p>
        </section>

    </form>
</div>

</body>
</html>
